server {
    listen 80;
    server_name DOMAIN_ANDA.COM www.DOMAIN_ANDA.COM;
    # HTTP redirect ke HTTPS (aktifkan setelah certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name DOMAIN_ANDA.COM www.DOMAIN_ANDA.COM;

    # SSL (diisi otomatis oleh certbot)
    # ssl_certificate     /etc/letsencrypt/live/DOMAIN_ANDA.COM/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ANDA.COM/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: ws:;" always;

    # ── Frontend static files ─────────────────────────────────────────────
    root /var/www/sjgroup/dist;
    index index.html;

    # Semua route SPA → index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Cache control untuk HTML (jangan cache, supaya update langsung terasa)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Cache aset statis (JS/CSS/gambar hasil build Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Proxy REST API → backend Node.js ─────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Sembunyikan versi server dari response
        proxy_hide_header X-Powered-By;
    }

    # ── Proxy WebSocket Socket.io ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s; # Socket koneksi panjang
    }

    # ── File upload (served langsung dari backend) ────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        # Blok akses file tersembunyi
        location ~ /\. { deny all; }
    }

    # ── Blok akses file berbahaya ─────────────────────────────────────────
    location ~ /\. { deny all; }
    location ~ \.(php|sh|py|pl|env|git|sql)$ { deny all; return 404; }

    # Ukuran maksimum upload
    client_max_body_size 25M;

    # Sembunyikan versi Nginx
    server_tokens off;
}
